<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hailo Detection</title>
  <style>
    :root {
      --primary: #03a9f4;
      --bg: #1c1c1c;
      --card-bg: #2a2a2a;
      --text: #e0e0e0;
      --text-muted: #888;
      --border: #444;
      --success: #4caf50;
      --warning: #ff9800;
      --error: #f44336;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 16px;
    }
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }
    header h1 { font-size: 1.3rem; font-weight: 600; }
    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      display: inline-block;
    }
    .status-dot.ok { background: var(--success); }
    .status-dot.warn { background: var(--warning); }
    .status-dot.err { background: var(--error); }

    .video-wrapper {
      position: relative;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 16px;
      aspect-ratio: 4 / 3;
    }
    .video-wrapper img {
      width: 100%; height: 100%;
      object-fit: contain;
      display: block;
    }
    .video-overlay {
      position: absolute;
      top: 12px; left: 12px;
      background: rgba(0,0,0,0.6);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--success);
    }

    .stats-bar {
      display: flex;
      gap: 16px;
      background: var(--card-bg);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .stat-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--primary);
    }
    .stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .detection-list {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 16px;
    }
    .detection-list h3 {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .det-item {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .det-item:last-child { border-bottom: none; }
    .det-conf { color: var(--primary); font-weight: 600; }
    .det-empty { color: var(--text-muted); font-style: italic; }

    .hint {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.8rem;
      padding: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <span id="statusDot" class="status-dot warn"></span>
      <h1>Hailo Object Detection</h1>
    </header>

    <div class="video-wrapper">
      <img id="videoFrame" src="" alt="" />
      <div id="overlay" class="video-overlay">&#9679; LIVE</div>
    </div>

    <div class="stats-bar">
      <div class="stat">
        <span id="statObjects" class="stat-value">0</span>
        <span class="stat-label">Objects</span>
      </div>
      <div class="stat">
        <span id="statFps" class="stat-value">--</span>
        <span class="stat-label">FPS</span>
      </div>
      <div class="stat">
        <span id="statCamera" class="stat-value">--</span>
        <span class="stat-label">Camera</span>
      </div>
      <div class="stat">
        <span id="statHailo" class="stat-value">--</span>
        <span class="stat-label">Hailo</span>
      </div>
    </div>

    <div class="detection-list">
      <h3>Detected Objects</h3>
      <div id="detList"><span class="det-empty">Waiting for detections...</span></div>
    </div>

    <div class="hint">
      Real-time YOLOv6n inference via HailoRT multi-process service
    </div>
  </div>

  <script>
    const basePath = (() => {
      const path = window.location.pathname;
      if (path.startsWith("/api/hassio_ingress")) {
        const parts = path.split("/");
        return "/" + parts.slice(1, 4).join("/");
      }
      return "";
    })();

    function apiUrl(ep) { return basePath + ep; }

    const videoFrame = document.getElementById("videoFrame");
    const statObjects = document.getElementById("statObjects");
    const statFps = document.getElementById("statFps");
    const statCamera = document.getElementById("statCamera");
    const statHailo = document.getElementById("statHailo");
    const statusDot = document.getElementById("statusDot");
    const detList = document.getElementById("detList");

    let frameCount = 0;
    let fpsStart = Date.now();

    // JPEG polling — works through HA ingress
    function pollFrame() {
      const img = new Image();
      img.onload = function() {
        videoFrame.src = img.src;
        frameCount++;
        const elapsed = (Date.now() - fpsStart) / 1000;
        if (elapsed >= 2) {
          statFps.textContent = (frameCount / elapsed).toFixed(1);
          frameCount = 0;
          fpsStart = Date.now();
        }
        setTimeout(pollFrame, 100);
      };
      img.onerror = function() {
        setTimeout(pollFrame, 1000);
      };
      img.src = apiUrl("/video_feed?t=" + Date.now());
    }
    pollFrame();

    // Status polling
    function pollStatus() {
      fetch(apiUrl("/api/status"))
        .then(r => r.json())
        .then(data => {
          statCamera.textContent = data.camera ? "OK" : "N/A";
          statHailo.textContent = data.hailo ? "OK" : "N/A";
          statObjects.textContent = data.detections;

          if (data.camera && data.hailo) {
            statusDot.className = "status-dot ok";
          } else if (data.camera || data.hailo) {
            statusDot.className = "status-dot warn";
          } else {
            statusDot.className = "status-dot err";
          }
        })
        .catch(() => {
          statusDot.className = "status-dot err";
        });
    }
    setInterval(pollStatus, 3000);
    pollStatus();

    // Detection list — parse from status since server draws boxes on frame
    // We'll add a dedicated endpoint later if needed; for now status gives count
    // The bounding boxes are drawn server-side on the JPEG
  </script>
</body>
</html>
