name: "Hailo Example App"
version: "1.1.0"
slug: hailo_example
description: >-
  Real-time object detection using a USB camera and Hailo-8L via the
  HailoRT multi-process service. Displays live video with bounding boxes.
url: "https://github.com/mikehailodev/hailo-example-addon"
arch:
  - aarch64
startup: application
stage: experimental
init: false
ingress: true
ingress_port: 8099
ingress_entry: /
panel_icon: "mdi:cctv"
panel_title: "Hailo Detection"
host_ipc: true
video: true
map:
  - share:rw
options:
  camera_source: "/dev/video0"
  confidence_threshold: 0.5
schema:
  camera_source: str
  confidence_threshold: "float(0.1,1.0)"
